# ユビスマ ノーマルレギュレーション 能力解説まとめ

## 前提となる基本思想
このゲームは効果のバランスが非常に細かく調整されており、明確に強い・弱い能力はほぼ存在しない。すべての能力は特定の盤面・状況において強さを発揮するよう設計されており、状況を選ばず常に強い効果はほぼ存在しない。ゲーム制作者側で複数の戦略(A・B・C・D…)がある程度想定されており、ひとつの戦略を選ぶと他の戦略で使う能力が不要になることはあるが、それ以外で「全く使わない能力」というものは存在しないと言ってよいレベルでバランス調整されている。
あくまで人間プレイヤーによるコンセンサス。これが絶対とは限らず、誤っている可能性も損z内する。最適解では一切使用しないスキルが存在する可能性もある。

## 通常スキル

### 数字
- **強い局面**: 自分の手が1つの時(終盤)
- 数字が強い盤面は基本的に「自分の手が1つの場合」。自分の手が2つの時に数字を宣言する上級者はあまりいない(ただしガード使用後ならあり得る)。
- 数字の強さはガードの有無で圧倒的に変わる。ガードがない状態で数字を言うと、次のターンにコピーされる危険性が高い。
- コピーの仕組み:プレイヤーAが数字を言って当て、手を1つ下ろす → 次のターンプレイヤーBが数字をコピー → 相手の手が残り1つなので1/2の確率で当たる → 当たれば1発上がり。
- したがって数字に対して圧倒的に強いのはコピー。数字を積極的に手下ろしに使うと、1/2でコピーによって逆に1発上がりされる構造。
- ガード後に数字を打てば、仮にコピーされて当てられてもガードのおかげで1発上がりされずに済む。ガードからの数字は基本的な動き。
- ただしお互いの手が2個の状態でガードからの数字は当たりにくく、スキップからのフラッシュなど他選択肢がある。
- 手を1つ下ろす行為自体のデメリット:勝利に近づく一方、相手視点で指の的中確率が上がる(2手→3パターン、1手→2パターン)。これによりフラッシュなどが通りやすくなる。
- 数字は自分の手が残り1つの時に最後に上がる手段として最適。数字以外で残り1手から効率よく上がる手段は少ない(フラッシュ等は基本的に手が2つの時用)。
- カウンターへの耐性が比較的高い:カウンターを言われても数字が外れていれば自分が手を下ろせる、当たって相手がカウンターを置いてなければ手を下ろせる、と分岐に強い。
- 終盤ティアA、序盤ティアC程度。基本的に終盤に使う能力。
- 序盤の面白い使い方:相手がセメントを警戒して指を上げない序盤に、序盤からあえて「0」と宣言して手を1つ下ろし、圧をかける戦法も可能。

### フラッシュ
- **強い局面**: 準備をした上で使う / 相手の手が少ない時
- カウンターへの耐性が極めて弱い。無効化されるか、一発上がりされる。
- 序盤は手が2個ずつで的中確率1/3。さらにすかされた場合、ストックされると非常に厳しい(特にフラッシュとフェイントの両方をストックされ、チョイスで宣言され続けると常に安全にフラッシュを打たれる地獄になる)。
- セメントとの組み合わせ:相手の指2つをセメントすれば次ターン相手は必ず2本上げる必要があり、カウンターを言わなければ100%決まる。1つだけセメントでも50%。
- ロックとの組み合わせ:ロックで相手のカウンターを封じてから打てば確率が高まる。
- ロック + セメント2つの状態なら、カウンター不可かつ指2本確定でフラッシュが絶対に通る。
- ガードとの組み合わせ:自分がガードを張った上でフラッシュを使うと、仮にカウンターされて数字を当てられても、本来の大逆転(相手の一発上がり)を回避してガードが割れるだけで済む。逆にガードを張られているとフラッシュは通らないので、ガードがある相手には事実上使えない。
- 相手のフラッシュを防ぐ手段:相手をセメントしておけば、自分が指を1本も上げないことで相手のフラッシュが絶対に決まらないようにできる。
- 相手の手が2つ(セメント無し)で33%、1つで50%と、相手の手が少ないほど決まりやすい。

### セメント
- **強い局面**: 序盤 / 他能力との組み合わせ
- 相手の指の選択肢を固定することで、相手からのフラッシュを決めづらくし、自分からのフラッシュを決めやすくする。
- 終盤、相手の手1つをセメントできていた場合、相手が手を1つ下ろせば全ての手がセメントされた状態になり、常にフラッシュで試合を決める準備ができている状態に。
- 数字とは真逆で、序盤ティアB、終盤はC。
- ロックとの組み合わせでフラッシュを組みやすくする用途や、チャージとの相性(セメント→チャージ→数字で一発上がり)も良い。

### ガード
- **強い局面**: 汎用的 / 攻めの起点
- フラッシュ、チャージ、クイック、数字からのコピー等、様々な一発上がりに対して耐性を得られる強力な効果。
- 強いプレイヤーが好んで使うイメージ。ガードを張っておけば次に打つフラッシュ等で仮にカウンター・的中されても敗北を回避できる。
- 一見守りに見えるが、攻めやすくなるという利点がある。
- ストックとの組み合わせ:自分で能動的に追加1ターンを得てかつストックできる能力はガードしかないため、ガードからのストックは強い組み合わせ。

### チャージ
- **強い局面**: 数字を実質一発上がりに変換
- 数字を一発上がりに変換できるため、相手にかなりの圧力をかけられる。
- 対処法:ガードを張られ続ける、数字をすかされてコピーされる等。
- カウンターに対して若干弱い:チャージ状態で数字を言ってカウンターされると、その時点でチャージを消費してしまう仕組み。さらに、数字が当たっていた場合には相手が手を2つ降ろせてしまう。

### クイック
- **強い局面**: 指を当てずに一発上がり
- 本来このゲームの一発上がり(フラッシュ・チャージ・数字コピー等)は指の数を当てる必要があるが、クイックだけは指を関係なく問答無用で一発上がりできる唯一の能力。
- 手の残り数が2つの時でも強いが、1つの時だとそれ以上に強いかもしれない。なぜなら、次の次のターンでも実質的に上がりを狙えるから。
- 対処法は多い:
  - スキップで「一発上がり→手1つ下ろし」に格下げされる
  - ガードでほぼ無効化
  - 次ターンでクイックを言うか言わないかの読み合いになり、言わないとせっかく貯めたクイックが手1つ下ろしの能力に格下げ(これでもフラッシュの的中確率が上がるなど痛い)。
- 主な対処法であるガードとスキップはテンポアドバンテージを取るのが得意なため、せっかくクイックでアドバンテージを取ってもうまく返されてしまう。

### スキップ
- **強い局面**: 足場・組み合わせ
- 単発で遣っても、自分と相手のターンを消費しているだけで意味がない。
- コピーすると実質+1ターンのアドバンテージになる。
- 用途:
  - 相手のガードやクイック、自分にかかっているロックの解除
  - バフ・デバフの解除とテンポアドバンテージの獲得
  - スキップ⇒コピーの繰り返しでターンを永久に獲得する圧力
  - 相手がブロック・ミラーを打ってきそうな場面で使ってかわす
- 単体では何もできず、次の攻撃につなげる足場としてのスキル。うまい人が使うと非常に強く、決められるとアドバンテージを返されることが多いため警戒される。

### 相手ターン中スキル

### カウンター
- メタ能力(対カウンタースキル)以外に関しては、カウンターを宣言した側がアドバンテージを取れる。
- 相手のやりたいことを積極的に止めることができる。

## 対カウンタースキル

### フェイント
- **強い局面**: カウンターを読んで宣言すれば一気に勝ちに近づく
- 対カウンタースキル以外の能力はカウンターを置けば止められるものが多いが、フェイント・ロックの存在がカウンターを抑制する。
- 決まれば自分の手を残り1つにして、さらにもう1段動けるため、一気に勝ちに近づく。
- より直接的なアドバンテージになるので、対カウンタースキルとしてはロックよりフェイントを使うことが多い。
- 弱み:
  - コピーされた時のダメージが大きい。プレイヤーAがフェイント→カウンター無し→プレイヤーBがコピー→そこでAがカウンター、となるとBが1発で上がってしまう。
  - すかされた時にストックされる危険。フェイントをストックされた状態で他(例:フラッシュ)もストックされると、チョイスが安定宣言になる(相手がカウンター言えばフェイント選択、言わなければフラッシュ選択)。
  - 参照スキル(ストック・コピー)に弱いのが最大の弱点。

### ロック
- **強い局面**: フェイントよりやや劣るが多用途
- フェイントより強さは若干劣るが、様々な使い道がある。
- セメントとの組み合わせでフラッシュを組みやすくする。
- 相手がロック中なら、必殺スキルのブーストやタイム、その他強力なスキルがカウンターで止められず必ず決まるようになる。
- フェイントがストックされると非常に厳しいため、それをケアするためにあえてロックを使ってフェイントをストックさせないという立ち回りが存在。
- コピーされた時のダメージもフェイントより比較的小さい。

## 参照スキル

### コピー
- 主に数字・フェイントに対して使うことが多い。数字・フェイントは本来手を1つ下ろす能力だが、コピーすることで2つ降ろすに変換できる。
- コピーの存在があるからこそ、序盤に数字でどんどん手を下ろす戦略が抑制されている。
- 重要な特性:参照スキルであるコピーは参照スキルに参照されない。コピーをコピー・ストックすることはできない。
- 例:相手のフェイントをコピーすると、相手はそのコピーされたフェイントをストック・コピーできない。フェイントを使いたければもう一度フェイントを言い直さなければならず、ストックも不可能。
- 極端に言えば、コピーだけで戦っていれば相手の参照スキル（コピー・ストック）を完全に封じることができる。つまり、相手の参照スキル対策として多用する。同じ効果だったとしても、フラッシュを宣言するよりフラッシュをコピーした方が強い。

### ストック
- **強い局面**: 長期戦向け
- それ自体で何かできるわけではないが、能力を貯めていくことで強さを発揮。
- チョイスと組み合わせると後出しジャンケンが可能:対カウンタースキルと通常スキルを同時にストックすれば、相手がカウンターを言うか言わないかに関わらず確実にアドバンテージを取れる。
- 通常スキル同士の組み合わせも有効:フラッシュとセメントをストック→チョイスでフラッシュ宣言→カウンターされて数字も当てられた → 通常なら敗北だが、チョイスでセメントを選択することで回避できる。

### チョイス
- 相手がカウンターを言ったか言わないかを判断してから能力を言える、後出しジャンケン的な能力。
- チョイスで宣言した能力は参照能力になるため、相手は参照できない。例:ガードをチョイスで使用→カウンターされても相手はそのガードをコピー・ストックできない。
- ストックしてある能力Aを宣言したい場合、必ず通常宣言ではなくチョイスで宣言する方が基本的に強い(相手の参照スキルへのメタ的立ち回り)。

### ドロップ
- 能力を貯めていき、その貯めた能力を相手に使わせなくする能力。
- 相手の選択肢を一気に狭めることができる。
- ストック・チョイスを軸としつつ、ドロップで選択肢を狭めるという使い方。
- 参照スキル全般について:うまいプレイヤーは、相手の宣言したスキルを常に参照し続けて相手の参照スキルを封じるという立ち回りが多い。

### オール
- ストックしているすべてのスキルの効果を好きな順番で必ず発動する必殺級のスキル。
- フラッシュをストックしている場合、オール宣言にカウンターされてもフラッシュだけ発動しない、という選択はできない。
- ただし、すべてのストックを失ってしまうというデメリットは存在する。カウンターされたら（対カウンター能力があればまだよいが）かなり痛手。
- ロックとの組み合わせでオールを使うと確実に発動できるため、ロックとの組み合わせが強い。
- あまり積極的には切らない。いざという時の切り札として溜めておいて、最後の詰めに使うのが基本。
- 存在そのものが物凄い圧のため、使わなくても相手にプレッシャーをかけ続けることができる。

## 必殺スキル

### ブースト
- +3ターン獲得
- 一見めちゃくちゃ強そうだが、カウンターされると必殺スキル宣言なのに止められ、もう必殺スキルを宣言できなくなる弱さがある。
- 追加3ターンを得たからといって勝ち切る方法は意外と多くない。ブーストを言ったターン自体は消費するので、実質+2ターン。
- このプラス2ターンで勝ち切る選択を迫られる。逆に、勝ち切れる状況ならめちゃくちゃ強い。
- ブーストを切ると当然ブロックは切れなくなる(攻めると守れなくなるトレードオフ)。

### ブロック
- スキップ以外の能力を全て止められる
- スキップを宣言されない限り相手の能力を止められるため、ブースト・タイムと比べても比較的安定な必殺スキル。
- 必殺スキルを序盤に切らずに終盤まで残しておき、本当にやばい時にブロックを切るのが基本。
- 相手から見ると「攻撃系を打つのかブロックを切るのかわからない」というプレッシャーがかかり続けるため、なるべく序盤に必殺スキルを切らずに終盤まで残しておきたい。

### タイム
- **強い局面**: 組み合わせ前提の上級者向け
- セメント・ロックとの組み合わせが非常に強い。
- タイム中はフェイント・ガード・スキップといったテンポを取る能力に対して非常に強くなる。
- タイムとクイックの組み合わせ:本来クイックはスキップ・ガードで対処できるが、スキップしても相手にターンが渡る、ガードしてもターンを得られず相手に返さなければならない、という形になる。
- 他能力と組み合わせて初めて強くなる、かなり上級者向けの難しい能力。

## 全体のまとめ
各能力は単独ではなく、他能力との関係性の中で強さが規定されている複合的な設計になっている。
