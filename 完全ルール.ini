定義 

スキル/宣言/効果/発動

スキルを宣言することで効果を発動する。
例）フラッシュというスキルを『いっせーのーせーフラッシュ！』と宣言することで、「自分と相手の上げた指の数が同じだった場合、一発上がりする」という効果を発動する。

フェーズ/ターン

フェーズ	自分がターンをはじめてから相手がターンをはじめるまでの期間
ターン	スキルを1回宣言する期間
基本は1フェーズにつき1ターン行動する。
フェイント等の効果で追加ターンを得た場合、1フェーズ中に2ターン以上行動することになる。
ルール 
先手プレイヤーは、開幕の1フェーズ目にフラッシュおよび必殺スキルを宣言することができない。
スキル一覧 
※手を降ろす行為について、効果の対象とする者が明記されていない場合、自分を対象とする
例）「手を1つ降ろす」→「自分の手を1つ降ろす」

通常スキル

数字（難易度：★☆☆）

上がった指の数が宣言した数と同じだった場合、手を1つ降ろす。

フラッシュ（難易度：★☆☆）

自分と相手の上げた指の数が同じだった場合、一発上がりする。

セメント（難易度：★☆☆）

上がった指を下げられなくする。ゲーム終了時まで継続。

ガード（難易度：★☆☆）

次に相手が一発上がりするとき、その一発上がりを無効化する。次の自分のフェーズのはじめまで継続。
追加1ターンを得る。

チャージ（難易度：★☆☆）

次に自分が数字を宣言したとき、手を1つ降ろす代わりに一発上がりする。

クイック（難易度：★★☆）

次の自分のターン中にクイックの効果を発動した場合、一発上がりする。
次の次の自分のターン中にクイックの効果を発動した場合、手を1つ降ろす。

スキップ（難易度：★★★）

相手は（スキルを宣言できる）次の相手のフェーズ中、スキルを宣言することができない。
このターンの直前に自分がスキップを宣言していた場合、またはスキップの効果を発動していた場合、上記の効果を2回分発動する。

相手ターン中スキル
相手のターン中にのみ宣言できるスキル。

カウンター（難易度：★☆☆）

相手がこのターン中に宣言したスキル（対カウンタースキルを除く）の効果を発動する代わりに、自身が以下の処理を行う。
相手が宣言したスキル
処理
数字	当たっていれば手を1つ降ろす。外れていれば相手の手を1つ降ろす。
フラッシュ	相手が宣言したスキルの効果を発動する。
その他	何もしない。

対カウンタースキル
相手がカウンターを宣言した場合に効果を発動するスキル。相手がカウンターを宣言しなければ何も起こらない。

フェイント（難易度：★☆☆）

手を1つ降ろし、追加1ターンを得る。

ロック（難易度：★★☆）

次の自分のターン中、相手はカウンターを宣言できなくなる。

参照スキル
1ターン前に宣言された通常スキル/対カウンタースキルを参照するスキル。参照スキル/必殺スキルは参照できない。

コピー（難易度：★★★）

1ターン前に宣言されたスキルの効果を発動する。
このスキルを宣言して手を降ろす時、代わりに一発上がりする。

ストック/チョイス/ドロップ（難易度：★★★）

ストック	1ターン前に宣言されたスキル（数字を除く）をストックする。
チョイス	自分がストックしたスキルの中から1つを選び、その効果を発動する。ただし、このフェーズ中に選んだスキルを再度選ぶことはできない。
ドロップ	次の相手のフェーズ中、自分がストックしたすべてのスキルを相手が宣言できないようにする。さらに、追加1ターンを得る。

必殺スキル
各プレイヤーがゲーム中にそれぞれ1度だけ宣言できるスキル。

ブースト（難易度：★☆☆）

追加3ターンを得る。

ブロック（相手ターン中スキル）（難易度：★☆☆）

相手は、このターン中に宣言したスキル（スキップを除く）の効果を発動できない。

リバーシ（難易度：★★☆）

自分と相手の状態（手の数、各種バフ・デバフ）を入れ替える。
※ストックは対象外

タイム（難易度：★★★）

次に相手がスキルを宣言した後、その次にスキルを宣言するプレイヤーは必ず自分になる。
追加1ターンを得る。